name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            args: ''
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: ./src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libxdo-dev

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: RelicCracker ${{ github.ref_name }}
          releaseBody: |
            See the [changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for what changed.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
